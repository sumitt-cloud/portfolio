<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Skills</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<section class="py-20">
  <div class="max-w-6xl mx-auto px-6">

    <!-- Heading -->
    <h2 class="text-4xl font-bold text-center mb-14">
      My <span class="text-pink-500">Skills</span>
    </h2>

    <!-- Skills Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-8">

      <!-- Card -->
      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        HTML
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        CSS
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        JavaScript
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        Node.js
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        Express.js
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        MongoDB
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        Tailwind CSS
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center shadow-lg 
                  hover:scale-110 hover:bg-pink-500 transition duration-300 cursor-pointer">
        Git & GitHub
      </div>

    </div>
  </div>
</section>

</body>
</html>
