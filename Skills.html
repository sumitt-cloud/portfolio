<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Skills</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body class="bg-gray-900 text-white">
    <img
      src="./videos/original-71476da5d324c31e8f87131d3f4d09a9.gif"
      alt="skils"
      class="fixed w-full h-full -z-10 object-cover"
    />
    <nav class="py-20">
      <a href="./index.html">
        <h1 class="max-w-4xl text-2xl font-bold text-black">BACK TO</h1>
        <h1 class="max-w-4xl text-2xl font-bold text-pink-500">HOME</h1>
      </a>
    </nav>
    <section class="py-20">
      <div class="max-w-6xl mx-auto px-6">
        <!-- Heading -->
        <h2 class="text-4xl font-bold text-center mb-14 text-black">
          My <span class="text-pink-500">Skills</span>
        </h2>

        <!-- Skills Grid -->
        <div class="bg-gray-900 py-24 sm:py-32">
          <div class="mx-auto max-w-7xl px-6 lg:px-8">
            <h2 class="text-center text-lg/8 font-semibold text-white">
              Tools & Technologies I Work With
            </h2>
            <div
              class="mx-auto mt-10 grid max-w-lg grid-cols-4 items-center gap-x-8 gap-y-10 sm:max-w-xl sm:grid-cols-6 sm:gap-x-10 lg:mx-0 lg:max-w-none lg:grid-cols-5"
            >
              <i
                class="fa-brands fa-html5 col-span-2 max-h-12 w-full object-contain lg:col-span-1 text-gray-100 text-5xl hover:text-red-400 transition duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              >
              </i>
              
              <img src="https://cdn.simpleicons.org/tailwindcss" 
                class="text-gray-300 col-span-2 max-h-12 w-full object-contain lg:col-span-1 text-5xl grayscale hover:grayscale-0 transition duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              />
              

              <i
                class="fa-brands fa-react text-gray-300 col-span-2 max-h-12 w-full object-contain lg:col-span-1 text-5xl hover:text-blue-400  transition  duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              >
              </i>

              <i
                class="fa-brands fa-node-js text-gray-300 col-span-2 max-h-12 w-full object-contain sm:col-start-2 lg:col-span-1 text-5xl hover:text-green-400 transition duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              ></i>

              <i
                class="fa-brands fa-js text-gray-300  col-span-2 col-start-2 max-h-12 w-full object-contain sm:col-start-auto lg:col-span-1 text-5xl hover:text-yellow-400 transition  duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              ></i>
              <i
                class="fa-brands fa-github text-gray-300  col-span-2 col-start-2 max-h-12 w-full object-contain sm:col-start-auto lg:col-span-1 text-5xl hover:text-gray-400 transition duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              ></i>
              <i
                class="fa-brands fa-git-alt text-gray-300  col-span-2 col-start-2 max-h-12 w-full object-contain sm:col-start-auto lg:col-span-1 text-5xl hover:text-red-400 transition duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
              ></i>
              <img 
  src="https://cdn.simpleicons.org/express" 
  class="w-10 h-10 text-gray-300 text-5xl invert hover:invert-0 transition duration-300 transform hover:scale-150 hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"
/>
