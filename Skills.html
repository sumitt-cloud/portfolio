<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills</title>
</head>
<link rel="stylesheet" href="output.css">
<body>
  <section class="py-16 bg-gray-900 text-white">
  <div class="max-w-6xl mx-auto px-6">
    
    <!-- Heading -->
    <h2 class="text-4xl font-bold text-center mb-12">
      My <span class="text-pink-500">Skills</span>
    </h2>

    <!-- Skills Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6">

      <!-- Skill Card -->
      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">HTML</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">CSS</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">JavaScript</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">Node.js</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">Express.js</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">MongoDB</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">Tailwind CSS</h3>
      </div>

      <div class="bg-gray-800 p-6 rounded-2xl text-center 
                  hover:scale-105 hover:bg-pink-500 transition duration-300 shadow-lg">
        <h3 class="text-lg font-semibold">Git & GitHub</h3>
      </div>

    </div>
  </div>
</section>
</body>
</html>
