<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
  (function() {
    emailjs.init("YFP_ns1_d7QVwtmQj");
  })();

  function sendMail(e) {
    e.preventDefault();

    emailjs.send("service_3bsdrge", "template_nttradm", {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      message: document.getElementById("message").value,
    })
    .then(function(response) {
      alert("Message sent successfully!");
    }, function(error) {
      alert("Failed to send message");
    });
  }
</script>
  <title>Contact</title>
</head>
<body>
  <nav class="py-20 bg-gray-800">
    <!-- Theme toggle -->
  
         <button id="theme_toggle" class="ml-auto "> <i class="fa-solid fa-moon text-2xl hover:text-white justify-end 
         "></i> </button>
    <a href="./index.html">

    <h1 class="max-w-4xl text-2xl font-bold text-white">
      BACK TO 
    </h1>
    <h1 class="max-w-4xl text-2xl font-bold text-pink-500">
      HOME
    </h1>
  </a>
</nav>
 <section class="py-20 bg-gray-900 text-white relative overflow-hidden ">

  <!-- Background Glow -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-pink-500/20 blur-3xl rounded-full"></div>

  <div class="max-w-4xl mx-auto px-6 relative z-10">

    <!-- Heading -->
    <h2 class="text-4xl font-bold text-center mb-4">
      Get In <span class="text-pink-500">Touch</span>
    </h2>

    <p class="text-gray-400 text-center mb-12">
      Let’s build something amazing together 🚀
    </p>

    <!-- Form Card -->
  
    <div class="bg-white/5 backdrop-blur-lg p-8 rounded-3xl shadow-2xl border border-white/10">

      <form class="space-y-6" onsubmit="sendMail(event)">

        <!-- Name -->
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-400">👤</span>
          <input id="name" type="text" placeholder="Your Name"
            class="w-full pl-12 p-3 rounded-xl bg-gray-800/70 border border-gray-700 
                   focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-500/30 transition">
        </div>

        <!-- Email -->
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-400">📧</span>
          <input id="email" type="email" placeholder="Your Email" required
            class="w-full pl-12 p-3 rounded-xl bg-gray-800/70 border border-gray-700 
                   focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-500/30 transition">
        </div>

        <!-- Message -->
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-400">💬</span>
          <textarea id="message" rows="5" placeholder="Your Message"
            class="w-full pl-12 p-3 rounded-xl bg-gray-800/70 border border-gray-700 
                   focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-500/30 transition"></textarea>
        </div>

        <!-- Button -->
        <button
          class="w-full bg-gradient-to-r from-pink-500 to-red-500 py-3 rounded-xl font-semibold 
                 hover:scale-105 hover:shadow-lg hover:shadow-pink-500/30 transition duration-300">
          🚀 Send Message
        </button>

      </form>

      <!-- Divider -->
      <div class="my-8 border-t border-gray-700"></div>

      <!-- Social Links -->
      <div class="flex justify-center gap-6 text-gray-400 text-lg">

        <a href="http://github.com/sumitt-cloud" class=" transition duration-300 transform hover:scale-150 hover:text-black  hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
           <i class="fa-brands fa-square-github text-4xl"></i>
   
        </a>

        <a href="https://www.linkedin.com/in/sumit-gupta-6a830a33b?utm_source=share_via&utm_content=profile&utm_medium=member_android" class="hover:text-blue-700 transition duration-300 hover:scale-150  hover:drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
              <i class="fa-brands fa-linkedin text-4xl"></i>
           
        </a>

    
      </div>

    </div>

  </div>
</section>
</body>
</html>
